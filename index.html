        }

        .container {
            max-width: 400px;
            width: 100%;
            background: var(--card);
            border-radius: 28px;
            padding: 32px 24px 28px;
            text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.12);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(56, 189, 248, 0.04);
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
        }

        /* subtle animated border glow */
        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 28px;
            padding: 2px;
            background: conic-gradient(from 0deg, transparent, rgba(56, 189, 248, 0.15), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: spinGlow 8s linear infinite;
        }

        @keyframes spinGlow {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Profile Image ── */
        .profile-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 14px;
        }

        .profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--cyan);
            box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(56, 189, 248, 0.08);
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background: #1a2633;
        }

        .profile:hover {
            transform: scale(1.03);
            box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(56, 189, 248, 0.12);
        }

        /* ring pulse behind avatar */
        .profile-wrap::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.15);
            animation: ringPulse 2.4s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.12);
                opacity: 0;
            }
        }

        /* ── Typography ── */
        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .highlight {

        .btn:hover {

        .ring-container .timer-center {

            flex-direction: column;

        }

        .ring-container .timer-center small {

        .timer-label {

    <script>
        (function() {
            'use strict';

            // ── Config ──
            const TOTAL_SECONDS = 120;
            const CIRCUMFERENCE = 188.5; // 2 * PI * 30

            // ── DOM refs ──
            const timerDisplay = document.getElementById('timerDisplay');
            const timerRing = document.getElementById('timerRing');
            const memberCount = document.getElementById('memberCount');

            // ── State ──
            let remaining = TOTAL_SECONDS;
            let endTime = Date.now() + remaining * 1000;
            let animationFrame = null;
            let redirectDone = false;

            // ── Social proof counter (animate on load) ──
            function animateMemberCount() {
                const target = 1247;
                const start = 1120;
                const duration = 1800;
                const startTime = performance.now();

                function tick(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const current = Math.round(start + (target - start) * eased);
                    memberCount.textContent = current.toLocaleString();
                    if (progress < 1) {
                        requestAnimationFrame(tick);
                    } else {
                        memberCount.textContent = target.toLocaleString();
                    }
                }
                requestAnimationFrame(tick);
            }

            // ── Timer update ──
            function updateTimer() {
                const now = Date.now();
                let diff = endTime - now;

                if (diff <= 0) {
                    diff = 0;
                    if (!redirectDone) {
                        redirectDone = true;
                        // Small delay so the user sees 0 before redirect
                        setTimeout(function() {
                            window.location.href = 'https://telegram.me/+a2JVj3l03bxiZGM1';
                        }, 300);
                    }
                }

                const seconds = Math.ceil(diff / 1000);
                const clamped = Math.max(0, Math.min(seconds, TOTAL_SECONDS));

                // Update display
                timerDisplay.textContent = String(clamped).padStart(2, '0');

                // Update ring
                const progress = clamped / TOTAL_SECONDS;
                const offset = CIRCUMFERENCE * (1 - progress);
                timerRing.setAttribute('stroke-dashoffset', offset);

                // Color shift when low
                if (clamped <= 10) {
                    timerRing.setAttribute('stroke', '#f87171');
                } else if (clamped <= 20) {
                    timerRing.setAttribute('stroke', '#fbbf24');
                } else {
                    timerRing.setAttribute('stroke', '#38bdf8');
                }

                // Continue if not done
                if (clamped > 0) {
                    animationFrame = requestAnimationFrame(updateTimer);
                } else {
                    // Ensure ring is at 0
                    timerRing.setAttribute('stroke-dashoffset', CIRCUMFERENCE);
                    timerRing.setAttribute('stroke', '#f87171');
                }
            }

            // ── Start ──
            animateMemberCount();
            updateTimer();

            // ── Cleanup on page hide ──
            document.addEventListener('visibilitychange', function() {
                if (document.hidden && animationFrame) {
                    cancelAnimationFrame(animationFrame);
                } else if (!document.hidden) {
                    // Re-sync when tab becomes visible
                    endTime = Date.now() + Math.max(0, remaining) * 1000;
                    if (!animationFrame && remaining > 0) {
                        updateTimer();
                    }
                }
            });

            // ── Re-sync if user leaves and returns ──
            window.addEventListener('focus', function() {
                if (remaining > 0) {
                    endTime = Date.now() + remaining * 1000;
                    if (!animationFrame) {
                        updateTimer();
                    }
                }
            });

        })();
    </script>
